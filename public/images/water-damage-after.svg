<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="waTitle">
  <title id="waTitle">Illustration: fully restored apartment ceiling, wall, and flooring after water damage repair</title>

  <polygon points="0,0 100,42 100,430 0,430" fill="#dce8f9"/>
  <rect x="100" y="0" width="700" height="430" fill="#eaf1fb"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#f5f7fa"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#e3ecf7"/>

  <!-- clean ceiling line -->
  <line x1="100" y1="42" x2="800" y2="0" stroke="#2b5c9e" stroke-width="2" opacity="0.4"/>

  <!-- window, crisp -->
  <rect x="560" y="90" width="150" height="130" fill="#ffffff" stroke="#2b5c9e" stroke-width="5"/>
  <line x1="635" y1="90" x2="635" y2="220" stroke="#2b5c9e" stroke-width="3"/>
  <line x1="560" y1="155" x2="710" y2="155" stroke="#2b5c9e" stroke-width="3"/>

  <!-- fresh baseboard trim -->
  <line x1="100" y1="430" x2="800" y2="430" stroke="#2b5c9e" stroke-width="4" opacity="0.5"/>

  <!-- clean floor planks -->
  <g stroke="#dce8f9" stroke-width="2">
    <line x1="60" y1="475" x2="720" y2="475"/>
    <line x1="40" y1="515" x2="760" y2="515"/>
    <line x1="20" y1="558" x2="790" y2="558"/>
    <line x1="260" y1="450" x2="220" y2="600"/>
    <line x1="460" y1="450" x2="460" y2="600"/>
  </g>

  <!-- new drywall + fresh paint accent stripe -->
  <rect x="150" y="70" width="260" height="16" rx="8" fill="#4e9e2e" opacity="0.85"/>

  <!-- framed photo -->
  <rect x="170" y="130" width="100" height="76" fill="#ffffff" stroke="#2b5c9e" stroke-width="4"/>
  <rect x="184" y="144" width="72" height="48" fill="#eef8e9"/>

  <!-- armchair, styled -->
  <g>
    <rect x="480" y="360" width="120" height="70" rx="14" fill="#2b2b2b"/>
    <rect x="470" y="330" width="140" height="45" rx="16" fill="#2b2b2b"/>
    <rect x="465" y="345" width="20" height="70" rx="8" fill="#2b2b2b"/>
    <rect x="605" y="345" width="20" height="70" rx="8" fill="#2b2b2b"/>
    <rect x="500" y="325" width="30" height="18" rx="4" fill="#4e9e2e"/>
  </g>

  <!-- floor lamp -->
  <line x1="660" y1="260" x2="660" y2="420" stroke="#2b5c9e" stroke-width="3"/>
  <path d="M630 240 h60 l-10 30 h-40 z" fill="#2b5c9e"/>
  <ellipse cx="660" cy="420" rx="24" ry="6" fill="#2b5c9e" opacity="0.5"/>

  <!-- potted plant near window -->
  <path d="M400 420 h30 l-4 34 h-22 z" fill="#4e9e2e"/>
  <path d="M415 420 q-26 -16 -6 -46 q22 12 6 46" fill="#6fbf4c"/>
  <path d="M415 420 q26 -12 10 -40 q-20 8 -10 40" fill="#4e9e2e"/>
</svg>
