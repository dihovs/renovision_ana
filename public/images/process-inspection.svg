<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="inspectionTitle">
  <title id="inspectionTitle">Illustration: inspector documenting damage with camera and clipboard</title>

  <!-- room shell -->
  <polygon points="0,0 100,42 100,430 0,430" fill="#dce8f9"/>
  <rect x="100" y="0" width="700" height="430" fill="#eaf1fb"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#f5f7fa"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#e3ecf7"/>

  <!-- water stain on wall being inspected -->
  <g opacity="0.5" fill="#b9ab97">
    <path d="M560 40 Q620 60 630 120 Q640 170 600 195 Q570 215 580 260 Q586 290 560 300 Q590 260 566 230 Q550 195 590 165 Q610 130 566 95 Z"/>
  </g>

  <!-- person standing, camera up -->
  <g>
    <rect x="220" y="240" width="70" height="110" rx="20" fill="#4e9e2e"/>
    <circle cx="255" cy="215" r="25" fill="#c98a5a"/>
    <path d="M231 203 a24 20 0 0 1 48 0 q-6 -8 -24 -8 t-24 8" fill="#2b2b2b"/>
    <!-- arm holding camera to face -->
    <path d="M285 260 q26 -8 34 -30" stroke="#c98a5a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <rect x="314" y="216" width="34" height="24" rx="4" fill="#2b2b2b"/>
    <circle cx="331" cy="228" r="8" fill="#33383f"/>
    <circle cx="331" cy="228" r="4" fill="#eaf1fb"/>
    <!-- other arm holding clipboard -->
    <path d="M226 270 q-14 30 0 58" stroke="#c98a5a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <rect x="196" y="318" width="42" height="54" rx="3" fill="#ffffff" stroke="#2b5c9e" stroke-width="3"/>
    <line x1="204" y1="330" x2="230" y2="330" stroke="#dce8f9" stroke-width="2"/>
    <line x1="204" y1="340" x2="230" y2="340" stroke="#dce8f9" stroke-width="2"/>
    <line x1="204" y1="350" x2="222" y2="350" stroke="#dce8f9" stroke-width="2"/>
    <rect x="208" y="314" width="18" height="7" rx="2" fill="#4e9e2e"/>
    <!-- legs -->
    <rect x="228" y="340" width="24" height="62" rx="8" fill="#33383f"/>
    <rect x="260" y="340" width="24" height="62" rx="8" fill="#33383f"/>
  </g>

  <!-- moisture meter marks on wall -->
  <g stroke="#2b5c9e" stroke-width="2" opacity="0.7">
    <line x1="540" y1="220" x2="552" y2="220"/>
    <line x1="540" y1="240" x2="552" y2="240"/>
    <line x1="540" y1="260" x2="552" y2="260"/>
  </g>

  <!-- camera flash accent -->
  <g opacity="0.8">
    <path d="M348 220 l14 -6 l-4 16 z" fill="#6fbf4c"/>
  </g>

  <!-- floor -->
  <g stroke="#dce8f9" stroke-width="2">
    <line x1="60" y1="470" x2="720" y2="470"/>
    <line x1="40" y1="510" x2="760" y2="510"/>
  </g>
</svg>
