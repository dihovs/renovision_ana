<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kaTitle">
  <title id="kaTitle">Illustration: bright renovated kitchen with new cabinetry and quartz counters</title>

  <!-- room shell -->
  <polygon points="0,0 100,42 100,430 0,430" fill="#dce8f9"/>
  <rect x="100" y="0" width="700" height="430" fill="#eaf1fb"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#f5f7fa"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#e3ecf7"/>

  <!-- clean floor tiles -->
  <g stroke="#dce8f9" stroke-width="2">
    <line x1="60" y1="475" x2="720" y2="475"/>
    <line x1="40" y1="515" x2="760" y2="515"/>
    <line x1="20" y1="558" x2="790" y2="558"/>
    <line x1="240" y1="450" x2="200" y2="600"/>
    <line x1="440" y1="450" x2="440" y2="600"/>
    <line x1="620" y1="450" x2="660" y2="600"/>
  </g>

  <!-- window, crisp mullions + plant -->
  <rect x="540" y="70" width="160" height="140" fill="#ffffff" stroke="#2b5c9e" stroke-width="5"/>
  <line x1="620" y1="70" x2="620" y2="210" stroke="#2b5c9e" stroke-width="3"/>
  <line x1="540" y1="140" x2="700" y2="140" stroke="#2b5c9e" stroke-width="3"/>
  <g>
    <rect x="700" y="200" width="26" height="20" rx="2" fill="#4e9e2e"/>
    <path d="M713 200 q-18 -26 0 -40 q18 14 0 40" fill="#6fbf4c"/>
    <path d="M713 200 q18 -20 4 -36 q-14 10 -4 36" fill="#4e9e2e"/>
  </g>

  <!-- framed art on wall -->
  <rect x="150" y="80" width="90" height="70" fill="#ffffff" stroke="#2b5c9e" stroke-width="4"/>
  <rect x="162" y="92" width="66" height="46" fill="#eef8e9"/>

  <!-- upper cabinets -->
  <rect x="270" y="120" width="270" height="100" rx="6" fill="#ffffff" stroke="#2b5c9e" stroke-width="3"/>
  <line x1="360" y1="120" x2="360" y2="220" stroke="#2b5c9e" stroke-width="2"/>
  <line x1="450" y1="120" x2="450" y2="220" stroke="#2b5c9e" stroke-width="2"/>
  <rect x="345" y="165" width="6" height="20" rx="3" fill="#4e9e2e"/>
  <rect x="435" y="165" width="6" height="20" rx="3" fill="#4e9e2e"/>

  <!-- quartz counter + lower cabinets -->
  <rect x="140" y="330" width="500" height="16" fill="#ffffff" stroke="#2b5c9e" stroke-width="2"/>
  <g stroke="#dce8f9" stroke-width="1.5" opacity="0.9">
    <line x1="180" y1="332" x2="230" y2="344"/>
    <line x1="420" y1="332" x2="470" y2="344"/>
  </g>
  <rect x="140" y="346" width="500" height="84" rx="4" fill="#f5f7fa" stroke="#2b5c9e" stroke-width="3"/>
  <line x1="260" y1="346" x2="260" y2="430" stroke="#2b5c9e" stroke-width="2"/>
  <line x1="380" y1="346" x2="380" y2="430" stroke="#2b5c9e" stroke-width="2"/>
  <line x1="500" y1="346" x2="500" y2="430" stroke="#2b5c9e" stroke-width="2"/>
  <line x1="620" y1="346" x2="620" y2="430" stroke="#2b5c9e" stroke-width="2"/>
  <rect x="245" y="380" width="6" height="18" rx="3" fill="#4e9e2e"/>
  <rect x="365" y="380" width="6" height="18" rx="3" fill="#4e9e2e"/>
  <rect x="485" y="380" width="6" height="18" rx="3" fill="#4e9e2e"/>
  <rect x="605" y="380" width="6" height="18" rx="3" fill="#4e9e2e"/>

  <!-- island with green accent -->
  <rect x="330" y="470" width="180" height="60" rx="6" fill="#4e9e2e"/>
  <rect x="330" y="470" width="180" height="14" rx="6" fill="#3d7d24"/>

  <!-- clean sink + faucet -->
  <rect x="330" y="322" width="120" height="14" rx="6" fill="#ffffff" stroke="#2b5c9e" stroke-width="2"/>
  <path d="M355 322 v-24 q0 -8 12 -8 h20" stroke="#2b5c9e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- pendant light -->
  <line x1="400" y1="0" x2="400" y2="70" stroke="#2b5c9e" stroke-width="2"/>
  <path d="M380 70 h40 l-8 26 h-24 z" fill="#2b2b2b"/>
  <circle cx="400" cy="100" r="14" fill="#f5f7fa" opacity="0.9"/>
</svg>
