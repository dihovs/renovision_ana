<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="callTitle">
  <title id="callTitle">Illustration: person calling to describe a renovation or water damage problem</title>

  <!-- room shell -->
  <polygon points="0,0 100,42 100,430 0,430" fill="#dce8f9"/>
  <rect x="100" y="0" width="700" height="430" fill="#eaf1fb"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#f5f7fa"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#e3ecf7"/>

  <!-- window -->
  <rect x="580" y="70" width="140" height="130" fill="#ffffff" stroke="#2b5c9e" stroke-width="5"/>
  <line x1="650" y1="70" x2="650" y2="200" stroke="#2b5c9e" stroke-width="3"/>
  <line x1="580" y1="135" x2="720" y2="135" stroke="#2b5c9e" stroke-width="3"/>

  <!-- table -->
  <rect x="230" y="400" width="340" height="16" fill="#ffffff" stroke="#2b5c9e" stroke-width="3"/>
  <rect x="250" y="416" width="14" height="70" fill="#eaf1fb" stroke="#2b5c9e" stroke-width="2"/>
  <rect x="520" y="416" width="14" height="70" fill="#eaf1fb" stroke="#2b5c9e" stroke-width="2"/>

  <!-- notepad on table -->
  <rect x="420" y="368" width="90" height="30" rx="2" fill="#ffffff" stroke="#2b5c9e" stroke-width="2"/>
  <line x1="432" y1="378" x2="498" y2="378" stroke="#dce8f9" stroke-width="2"/>
  <line x1="432" y1="388" x2="480" y2="388" stroke="#dce8f9" stroke-width="2"/>
  <rect x="500" y="376" width="24" height="6" rx="2" fill="#4e9e2e"/>

  <!-- chair -->
  <rect x="330" y="380" width="10" height="60" fill="#2b2b2b"/>

  <!-- person sitting, on the phone -->
  <g>
    <!-- torso -->
    <rect x="290" y="270" width="70" height="110" rx="20" fill="#2b5c9e"/>
    <!-- head -->
    <circle cx="325" cy="245" r="26" fill="#e8b98a"/>
    <!-- hair -->
    <path d="M300 232 a26 22 0 0 1 50 0 q-6 -8 -25 -8 t-25 8" fill="#4a3728"/>
    <!-- arm holding phone -->
    <path d="M350 290 q28 -14 30 -46" stroke="#e8b98a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <rect x="368" y="228" width="18" height="30" rx="5" fill="#33383f" transform="rotate(18 377 243)"/>
    <!-- other arm resting on table -->
    <path d="M296 300 q-8 40 8 70" stroke="#e8b98a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- legs -->
    <rect x="298" y="370" width="24" height="60" rx="8" fill="#33383f"/>
    <rect x="330" y="370" width="24" height="60" rx="8" fill="#33383f"/>
  </g>

  <!-- speech bubble with wrench/drop icon (describing the problem) -->
  <g>
    <rect x="150" y="180" width="100" height="66" rx="14" fill="#ffffff" stroke="#4e9e2e" stroke-width="3"/>
    <polygon points="190,246 190,266 214,246" fill="#ffffff" stroke="#4e9e2e" stroke-width="3"/>
    <path d="M195 200 q10 12 0 24 a9 9 0 1 0 10 0 q-10 -12 0 -24" fill="#2b5c9e" transform="translate(3,0) scale(0.9)"/>
  </g>
</svg>
