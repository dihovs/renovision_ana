<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wbTitle">
  <title id="wbTitle">Illustration: apartment ceiling and wall soaked by a burst pipe, before restoration</title>

  <polygon points="0,0 100,42 100,430 0,430" fill="#b9ab97"/>
  <rect x="100" y="0" width="700" height="430" fill="#cfc6ba"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#a89a86"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#8f8069" opacity="0.6"/>

  <!-- ceiling stain, large, spreading from a corner pipe run -->
  <g opacity="0.6" fill="#7c6b57">
    <ellipse cx="330" cy="40" rx="180" ry="60"/>
    <path d="M180 40 Q260 100 240 180 Q225 240 280 280 Q320 305 300 360 Q345 320 320 260 Q300 210 350 170 Q400 120 330 60 Z"/>
  </g>
  <path d="M220 55 Q280 130 250 210 Q290 270 260 340" stroke="#6f6151" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M340 40 Q380 110 340 180" stroke="#6f6151" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- crack -->
  <path d="M300 15 l14 20 l-8 10 l16 18" stroke="#5a4d3f" stroke-width="3" fill="none"/>

  <!-- window -->
  <rect x="560" y="90" width="150" height="130" fill="#e7e1d4" stroke="#7c6b57" stroke-width="5"/>
  <line x1="635" y1="90" x2="635" y2="220" stroke="#7c6b57" stroke-width="4"/>

  <!-- warped baseboard trim -->
  <path d="M100 430 Q400 420 800 430" stroke="#6f6151" stroke-width="6" fill="none" opacity="0.7"/>

  <!-- floor planks, warped/buckling -->
  <g stroke="#8a7a66" stroke-width="2" opacity="0.6">
    <path d="M60 470 Q400 455 720 470" fill="none"/>
    <path d="M40 512 Q400 495 760 512" fill="none"/>
    <path d="M20 558 Q400 538 790 558" fill="none"/>
  </g>

  <!-- large damp patch on floor -->
  <ellipse cx="360" cy="500" rx="150" ry="35" fill="#6f6151" opacity="0.3"/>
  <ellipse cx="360" cy="500" rx="90" ry="20" fill="#5f5142" opacity="0.25"/>

  <!-- bucket catching drip -->
  <path d="M420 440 h34 l-5 38 h-24 z" fill="#6f6151"/>
  <ellipse cx="437" cy="440" rx="17" ry="4" fill="#8a7a66"/>
  <circle cx="438" cy="360" r="3" fill="#5f6e78"/>
  <circle cx="438" cy="390" r="4" fill="#5f6e78" opacity="0.7"/>

  <!-- exposed drywall patch -->
  <rect x="160" y="260" width="70" height="90" fill="#a89a86" stroke="#6f6151" stroke-width="2" opacity="0.8"/>
  <line x1="160" y1="290" x2="230" y2="290" stroke="#6f6151" stroke-width="1.5"/>
  <line x1="160" y1="320" x2="230" y2="320" stroke="#6f6151" stroke-width="1.5"/>
</svg>
