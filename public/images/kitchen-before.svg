<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kbTitle">
  <title id="kbTitle">Illustration: dated kitchen before renovation, worn cabinets and vinyl flooring</title>

  <!-- room shell -->
  <polygon points="0,0 100,42 100,430 0,430" fill="#b9ab97"/>
  <rect x="100" y="0" width="700" height="430" fill="#cfc6ba"/>
  <polygon points="0,430 100,430 750,430 800,600 0,600" fill="#a89a86"/>
  <polygon points="750,430 800,430 800,600 750,600" fill="#8f8069" opacity="0.6"/>

  <!-- floor planks (worn) -->
  <g stroke="#8a7a66" stroke-width="2" opacity="0.55">
    <line x1="60" y1="470" x2="720" y2="470"/>
    <line x1="40" y1="510" x2="760" y2="510"/>
    <line x1="20" y1="555" x2="790" y2="555"/>
  </g>

  <!-- window -->
  <rect x="540" y="70" width="160" height="140" fill="#e7e1d4" stroke="#7c6b57" stroke-width="5"/>
  <line x1="620" y1="70" x2="620" y2="210" stroke="#7c6b57" stroke-width="4"/>
  <line x1="540" y1="140" x2="700" y2="140" stroke="#7c6b57" stroke-width="4"/>

  <!-- water stain cascading from ceiling corner -->
  <g opacity="0.55" fill="#7c6b57">
    <path d="M100 42 Q200 60 210 130 Q220 190 170 220 Q120 245 130 300 Q138 340 100 350 Q140 300 110 260 Q90 210 140 170 Q170 120 110 90 Z"/>
  </g>
  <path d="M112 60 Q160 120 130 190 Q150 250 118 310" stroke="#6f6151" stroke-width="4" fill="none" opacity="0.7"/>

  <!-- upper cabinets, sagging door -->
  <rect x="140" y="120" width="360" height="110" rx="4" fill="#9c8d78" stroke="#6f6151" stroke-width="3"/>
  <line x1="260" y1="120" x2="260" y2="230" stroke="#6f6151" stroke-width="2"/>
  <line x1="380" y1="120" x2="380" y2="230" stroke="#6f6151" stroke-width="2"/>
  <g transform="translate(150,145) skewY(-2)">
    <rect width="95" height="75" fill="#8a7a66" stroke="#6f6151" stroke-width="2"/>
  </g>

  <!-- counter + lower cabinets -->
  <rect x="140" y="330" width="500" height="18" fill="#7c6b57"/>
  <rect x="140" y="348" width="500" height="82" fill="#8f8069" stroke="#6f6151" stroke-width="3"/>
  <line x1="260" y1="348" x2="260" y2="430" stroke="#6f6151" stroke-width="2"/>
  <line x1="380" y1="348" x2="380" y2="430" stroke="#6f6151" stroke-width="2"/>
  <line x1="500" y1="348" x2="500" y2="430" stroke="#6f6151" stroke-width="2"/>
  <line x1="620" y1="348" x2="620" y2="430" stroke="#6f6151" stroke-width="2"/>

  <!-- sink basin, dated -->
  <rect x="330" y="322" width="120" height="14" rx="3" fill="#6f6151"/>
  <rect x="345" y="300" width="10" height="26" fill="#6f6151"/>

  <!-- damp patch + bucket on floor -->
  <ellipse cx="390" cy="470" rx="70" ry="18" fill="#6f6151" opacity="0.35"/>
  <path d="M370 430 h30 l-4 34 h-22 z" fill="#6f6151"/>
  <ellipse cx="385" cy="430" rx="15" ry="4" fill="#8a7a66"/>
  <circle cx="386" cy="452" r="3" fill="#5f6e78"/>

  <!-- peeling paint flecks -->
  <g fill="#9c8d78" opacity="0.8">
    <path d="M150 95 l10 -4 l2 10 z"/>
    <path d="M175 105 l8 -6 l4 9 z"/>
  </g>
</svg>
